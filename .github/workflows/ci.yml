name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rmbv
          POSTGRES_PASSWORD: rmbv
          POSTGRES_DB: rmbv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rmbv -d rmbv_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rmbv:rmbv@localhost:5432/rmbv_test
      JWT_SECRET: ci-jwt-secret-with-at-least-32-characters
      ADMIN_EMAIL: admin@sistema.local
      ADMIN_PASSWORD: rmbvadmin
      ADMIN_NAME: Admin
      KIOSK_API_KEY: ci-kiosk-key
      CI: true
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
