services:
  postgres:
    image: postgres:16-alpine
    container_name: gestao-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gestao
      POSTGRES_PASSWORD: gestao123
      POSTGRES_DB: gestao_sistema
    volumes:
      - gestao_pg_data:/var/lib/postgresql/data

volumes:
  gestao_pg_data:
